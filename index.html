<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compliance Definitions</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --primary: #22c55e;
      --primary-hover: #16a34a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #0b1022, #111827);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans Thai", sans-serif;
      padding: 16px;
    }

    .card {
      width: 100%;
      max-width: 560px;
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.35rem;
    }

    .result {
      display: grid;
      place-items: center;
      min-height: 120px;
      border: 1px dashed rgba(255,255,255,0.2);
      border-radius: 12px;
      margin-bottom: 16px;
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: 1px;
      user-select: none;
      padding: 8px;
      text-align: center;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.98rem;
      font-weight: 600;
      cursor: pointer;
      color: white;
      background: var(--primary);
      transition: 0.15s ease;
    }

    button:hover { background: var(--primary-hover); }
    button:active { transform: translateY(1px); }

    .secondary {
      background: #374151;
    }
    .secondary:hover {
      background: #4b5563;
    }

    .hint {
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.5;
    }

    code {
      background: rgba(255,255,255,0.08);
      padding: 2px 6px;
      border-radius: 6px;
      color: #d1fae5;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>สุ่มศัพท์ Compliance</h1>

    <div id="result" class="result">กดปุ่มเพื่อสุ่ม</div>

    <div class="controls">
      <button id="randomBtn" type="button">สุ่ม</button>
      <button id="resetBtn" class="secondary" type="button">รีเซ็ต</button>
    </div>

    <p class="hint">
      ศัพท์เกี่ยวกับ Compliance สำหรับการศึกษาและทำความเข้าใจ<br />
      จำนวนรวม <code>"50"</code> ศัพท์
    </p>
  </main>

  <script>
    const wordList = [
      "1. Compliance - ความสอดคล้องตามกฎเกณฑ์และข้อบังคับ",
      "2. Governance - การบริหารจัดการและการกำกับดูแล",
      "3. Risk Management - การจัดการความเสี่ยง",
      "4. Audit - การตรวจสอบและประเมินผล",
      "5. Policy - นโยบายและหลักเกณฑ์",
      "6. Regulation - ข้อกำหนด และระเบียบข้อบังคับ",
      "7. Procedure - ขั้นตอนการปฏิบัติงาน",
      "8. Control - การควบคุมและกลไกการตรวจสอบ",
      "9. Documentation - เอกสารและบันทึกข้อมูล",
      "10. Evidence - หลักฐานที่เป็นไปตามข้อกำหนด",
      "11. Assessment - การประเมินความสอดคล้อง",
      "12. Compliance Officer - เจ้าหน้าที่ปฏิบัติตามกฎข้อบังคับ",
      "13. Legal Requirement - ข้อกำหนดตามกฎหมาย",
      "14. Standard - มาตรฐานสากลหรือมาตรฐานกำหนด",
      "15. Enforcement - การบังคับใช้และสนับสนุน",
      "16. Violation - การละเมิดหรือไม่ปฏิบัติตาม",
      "17. Non-Compliance - ความไม่สอดคล้องตามข้อกำหนด",
      "18. Penalty - บทลงโทษหรือการลงโทษ",
      "19. Training - การฝึกอบรมและการศึกษา",
      "20. Monitoring - การติดตามและเฝ้าระวัง",
      "21. Internal Control - การควบคุมภายในองค์กร",
      "22. External Audit - การตรวจสอบจากภายนอก",
      "23. Root Cause Analysis - การวิเคราะห์สาเหตุหลัก",
      "24. Corrective Action - การแก้ไขและปรับปรุง",
      "25. Preventive Action - การป้องกันปัญหาล่วงหน้า",
      "26. Data Protection - การปกป้องข้อมูลส่วนบุคคล",
      "27. Confidentiality - ความเป็นความลับ",
      "28. Integrity - ความถูกต้องและสมบูรณ์ของข้อมูล",
      "29. Accountability - ความรับผิดชอบและการตอบสนอง",
      "30. Transparency - ความโปร่งใส",
      "31. Record Keeping - การเก็บรักษาบันทึก",
      "32. Due Diligence - การทำความเตรียมตัวอย่างรอบคอบ",
      "33. Code of Conduct - หลักจริยธรรมและประเพณี",
      "34. Whistleblower - ผู้เปิดเผยข้อมูลที่ผิดกฎหมาย",
      "35. Remediation - การแก้ไขและบรรเทาผลกระทบ",
      "36. Certification - การรับรองและหนังสือรับรอง",
      "37. Accreditation - การรับการรับรองมาตรฐาน",
      "38. Best Practice - วิธีปฏิบัติที่ดีที่สุด",
      "39. Stakeholder - ผู้มีส่วนได้ส่วนเสีย",
      "40. Risk Assessment - การประเมินความเสี่ยง",
      "41. Compliance Framework - กรอบการปฏิบัติตามกฎเกณฑ์",
      "42. Compliance Report - รายงานการปฏิบัติตามกฎเกณฑ์",
      "43. Third Party - บุคคลที่สาม",
      "44. Due Process - ขั้นตอนทางกฎหมายที่ยุติธรรม",
      "45. Remedial Measures - มาตรการแก้ไข",
      "46. Compliance Testing - การทดสอบความสอดคล้อง",
      "47. Audit Trail - บันทึกการตรวจสอบ",
      "48. Compliance Status - สถานะการปฏิบัติตาม",
      "49. Compliance Calendar - ปฏิทินกำหนดเวลาปฏิบัติตาม",
      "50. Compliance Culture - วัฒนธรรมการปฏิบัติตามกฎเกณฑ์"
    ];

    const resultEl = document.getElementById("result");
    const randomBtn = document.getElementById("randomBtn");
    const resetBtn = document.getElementById("resetBtn");

    function pickRandomItem(list) {
      if (!Array.isArray(list) || list.length === 0) return null;
      const index = Math.floor(Math.random() * list.length);
      return list[index];
    }

    function showRandom() {
      const picked = pickRandomItem(wordList);
      resultEl.textContent = picked ?? "ไม่มีข้อมูลสำหรับสุ่ม";
    }

    function resetResult() {
      resultEl.textContent = "กดปุ่มเพื่อสุ่ม";
    }

    if (randomBtn) randomBtn.addEventListener("click", showRandom);
    if (resetBtn) resetBtn.addEventListener("click", resetResult);
  </script>
</body>
</html>
